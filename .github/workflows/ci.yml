name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'

jobs:
  test-ios:
    name: "iOS Tests"
    runs-on: macos-14
    env:
      DEVELOPER_DIR: /Applications/Xcode_15.4.app/Contents/Developer

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Set up example app
        run: |
          npm i
          npx cordova prepare ios
        working-directory: ./example

      - name: Run iOS Unit Tests
        run: |
          xcodebuild test -quiet \
            -project OAuthPluginTests.xcodeproj \
            -scheme OAuthPluginTests \
            -testPlan UnitTests \
            -destination "platform=iOS Simulator,name=iPhone 15"
        working-directory: ./tests/ios

      - name: Run iOS UI Tests
        run: |
          xcodebuild test \
            -project OAuthPluginTests.xcodeproj \
            -scheme OAuthPluginTests \
            -testPlan DeviceTests \
            -destination "platform=iOS Simulator,name=iPhone 15" \
            -destination-timeout 300
        working-directory: ./tests/ios


  test-android:
    name: "Android Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Enable KVM group perms
        run: |
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Use Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up example app
        run: |
          npm i
          npx cordova prepare android
        working-directory: ./example

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@d9c87d481d55275bb5441eef3fe0e46805f9ef70 # v3
        with:
          gradle-version: 8.4

      - name: Run Android Unit Tests
        run: |
          gradle test
        working-directory: ./tests/android

      - name: Run Android UI Tests
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 29
          script: gradle connectedCheck
          working-directory: ./tests/android
